<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="750" height="420" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#333" font-weight="bold">Anatomy of a Scene Graph</text>

  <!-- Left side: "Image" representation -->
  <rect x="30" y="55" width="250" height="180" rx="6" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="155" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#888">Input Scene</text>
  <!-- Sky -->
  <rect x="40" y="85" width="230" height="60" rx="3" fill="#bbdefb"/>
  <!-- Tree -->
  <circle cx="200" cy="135" r="20" fill="#81c784"/>
  <rect x="196" y="145" width="8" height="25" fill="#795548"/>
  <!-- Person -->
  <circle cx="100" cy="125" r="10" fill="#ffcc80"/>
  <rect x="93" y="135" width="14" height="20" rx="2" fill="#42a5f5"/>
  <line x1="100" y1="155" x2="93" y2="175" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="155" x2="107" y2="175" stroke="#333" stroke-width="1.5"/>
  <!-- Dog -->
  <ellipse cx="160" cy="163" rx="16" ry="10" fill="#bcaaa4"/>
  <circle cx="175" cy="157" r="5" fill="#8d6e63"/>
  <!-- Ground -->
  <rect x="40" y="170" width="230" height="55" rx="3" fill="#c8e6c9"/>
  <!-- Bench -->
  <rect x="55" y="180" width="50" height="8" rx="2" fill="#795548"/>
  <rect x="60" y="188" width="4" height="12" fill="#795548"/>
  <rect x="96" y="188" width="4" height="12" fill="#795548"/>

  <text x="155" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#888" font-style="italic">A person in a park with a dog near a bench</text>

  <!-- Arrow from image to graph -->
  <line x1="290" y1="145" x2="340" y2="145" stroke="#999" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="315" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#999">parse</text>

  <!-- Scene Graph -->
  <!-- Object nodes -->
  <!-- Person -->
  <circle cx="420" cy="90" r="30" fill="#e3f2fd" stroke="#1772d0" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="87" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1772d0" font-weight="bold">person</text>
  <text x="420" y="101" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">standing</text>

  <!-- Dog -->
  <circle cx="600" cy="90" r="28" fill="#fce4ec" stroke="#c62828" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="87" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c62828" font-weight="bold">dog</text>
  <text x="600" y="101" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">brown</text>

  <!-- Park -->
  <circle cx="510" cy="210" r="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2e7d32" font-weight="bold">park</text>

  <!-- Bench -->
  <circle cx="380" cy="310" r="28" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="314" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e65100" font-weight="bold">bench</text>

  <!-- Tree -->
  <circle cx="640" cy="310" r="28" fill="#f1f8e9" stroke="#558b2f" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="314" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#558b2f" font-weight="bold">tree</text>

  <!-- Sky -->
  <circle cx="700" cy="200" r="22" fill="#e8eaf6" stroke="#3949ab" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3949ab" font-weight="bold">sky</text>

  <!-- Relationship edges -->
  <!-- person -> dog: "walking" -->
  <line x1="450" y1="88" x2="572" y2="88" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="487" y="73" width="50" height="16" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="512" y="84" text-anchor="middle" font-family="monospace" font-size="9" fill="#f57f17">walking</text>

  <!-- person -> park: "in" -->
  <line x1="435" y1="118" x2="497" y2="185" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="448" y="140" width="24" height="16" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="460" y="151" text-anchor="middle" font-family="monospace" font-size="9" fill="#f57f17">in</text>

  <!-- dog -> park: "in" -->
  <line x1="585" y1="115" x2="525" y2="187" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="545" y="140" width="24" height="16" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="557" y="151" text-anchor="middle" font-family="monospace" font-size="9" fill="#f57f17">in</text>

  <!-- person -> bench: "near" -->
  <line x1="405" y1="118" x2="388" y2="282" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="377" y="195" width="32" height="16" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="393" y="206" text-anchor="middle" font-family="monospace" font-size="9" fill="#f57f17">near</text>

  <!-- bench -> park: "in" -->
  <line x1="406" y1="305" x2="485" y2="230" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="432" y="258" width="24" height="16" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="444" y="269" text-anchor="middle" font-family="monospace" font-size="9" fill="#f57f17">in</text>

  <!-- tree -> park: "in" -->
  <line x1="618" y1="298" x2="535" y2="228" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="563" y="253" width="24" height="16" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="575" y="264" text-anchor="middle" font-family="monospace" font-size="9" fill="#f57f17">in</text>

  <!-- sky -> park: "above" -->
  <line x1="682" y1="210" x2="538" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="593" y="199" width="42" height="16" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="614" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#f57f17">above</text>

  <!-- Legend -->
  <rect x="355" y="365" width="230" height="45" rx="6" fill="#fff" stroke="#eee" stroke-width="1"/>
  <circle cx="380" cy="387" r="8" fill="#e3f2fd" stroke="#1772d0" stroke-width="1.5"/>
  <text x="395" y="391" font-family="Georgia, serif" font-size="10" fill="#666">Object node</text>
  <rect x="460" y="379" width="30" height="14" rx="7" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="500" y="391" font-family="Georgia, serif" font-size="10" fill="#666">Relationship</text>
</svg>