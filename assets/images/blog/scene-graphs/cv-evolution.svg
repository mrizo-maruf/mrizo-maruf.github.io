<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4ecfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8fde8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4f5d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fde8f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5d4ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fdf8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5eed4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1772d0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#333" font-weight="bold">The Evolution of Visual Scene Understanding</text>

  <!-- Timeline line -->
  <line x1="60" y1="290" x2="840" y2="290" stroke="#ccc" stroke-width="2"/>

  <!-- Classification Box -->
  <rect x="30" y="60" width="150" height="190" rx="8" fill="url(#grad1)" stroke="#90caf9" stroke-width="1.5"/>
  <text x="105" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#333" font-weight="bold">Classification</text>
  <line x1="50" y1="98" x2="160" y2="98" stroke="#90caf9" stroke-width="1"/>
  <text x="105" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">"What is in</text>
  <text x="105" y="136" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">this image?"</text>
  <rect x="55" y="152" width="100" height="50" rx="4" fill="#fff" stroke="#90caf9" stroke-width="1"/>
  <text x="105" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#1772d0">Cat: 0.92</text>
  <text x="105" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">Dog: 0.05</text>
  <text x="105" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">AlexNet (2012)</text>
  <text x="105" y="236" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">VGG, ResNet</text>
  <!-- Timeline dot -->
  <circle cx="105" cy="290" r="6" fill="#90caf9" stroke="#fff" stroke-width="2"/>
  <text x="105" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#666">2012</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="155" x2="215" y2="155" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Detection Box -->
  <rect x="220" y="60" width="150" height="190" rx="8" fill="url(#grad2)" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="295" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#333" font-weight="bold">Detection</text>
  <line x1="240" y1="98" x2="350" y2="98" stroke="#a5d6a7" stroke-width="1"/>
  <text x="295" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">"What & where?"</text>
  <rect x="245" y="142" width="100" height="65" rx="4" fill="#fff" stroke="#a5d6a7" stroke-width="1"/>
  <rect x="258" y="152" width="40" height="30" rx="2" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="278" y="172" text-anchor="middle" font-family="monospace" font-size="8" fill="#4caf50">cat</text>
  <rect x="288" y="162" width="45" height="35" rx="2" fill="none" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="310" y="184" text-anchor="middle" font-family="monospace" font-size="8" fill="#2196F3">dog</text>
  <text x="295" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">R-CNN (2014)</text>
  <text x="295" y="244" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">YOLO, SSD</text>
  <!-- Timeline dot -->
  <circle cx="295" cy="290" r="6" fill="#a5d6a7" stroke="#fff" stroke-width="2"/>
  <text x="295" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#666">2014</text>

  <!-- Arrow 2 -->
  <line x1="375" y1="155" x2="405" y2="155" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Segmentation Box -->
  <rect x="410" y="60" width="150" height="190" rx="8" fill="url(#grad3)" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="485" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#333" font-weight="bold">Segmentation</text>
  <line x1="430" y1="98" x2="540" y2="98" stroke="#ce93d8" stroke-width="1"/>
  <text x="485" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">"Pixel-level</text>
  <text x="485" y="136" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">understanding"</text>
  <rect x="435" y="148" width="100" height="60" rx="4" fill="#fff" stroke="#ce93d8" stroke-width="1"/>
  <!-- Segmentation blobs -->
  <ellipse cx="465" cy="173" rx="18" ry="14" fill="#e1bee7" opacity="0.7"/>
  <ellipse cx="505" cy="178" rx="22" ry="18" fill="#bbdefb" opacity="0.7"/>
  <rect x="440" y="190" width="90" height="10" rx="2" fill="#c8e6c9" opacity="0.7"/>
  <text x="485" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">FCN (2015)</text>
  <text x="485" y="244" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">Mask R-CNN</text>
  <!-- Timeline dot -->
  <circle cx="485" cy="290" r="6" fill="#ce93d8" stroke="#fff" stroke-width="2"/>
  <text x="485" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#666">2015</text>

  <!-- Arrow 3 -->
  <line x1="565" y1="155" x2="595" y2="155" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Scene Graphs Box (highlighted) -->
  <rect x="600" y="50" width="170" height="210" rx="8" fill="url(#grad4)" stroke="#ffb74d" stroke-width="2.5"/>
  <text x="685" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#333" font-weight="bold">Scene Graphs</text>
  <line x1="620" y1="88" x2="750" y2="88" stroke="#ffb74d" stroke-width="1"/>
  <text x="685" y="108" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">"What relates</text>
  <text x="685" y="124" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">to what?"</text>
  <!-- Mini scene graph -->
  <circle cx="655" cy="158" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="655" y="162" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">man</text>
  <circle cx="720" cy="148" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="720" y="152" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">horse</text>
  <circle cx="685" cy="198" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="685" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">hat</text>
  <line x1="669" y1="155" x2="706" y2="151" stroke="#ff9800" stroke-width="1"/>
  <text x="688" y="146" text-anchor="middle" font-family="monospace" font-size="6" fill="#e65100">riding</text>
  <line x1="660" y1="172" x2="680" y2="184" stroke="#ff9800" stroke-width="1"/>
  <text x="662" y="183" text-anchor="middle" font-family="monospace" font-size="6" fill="#e65100">wearing</text>
  <text x="685" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">Visual Genome</text>
  <text x="685" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666">(2017)</text>
  <!-- Timeline dot -->
  <circle cx="685" cy="290" r="6" fill="#ffb74d" stroke="#fff" stroke-width="2"/>
  <text x="685" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#666">2017</text>

  <!-- Arrow to future -->
  <line x1="775" y1="155" x2="840" y2="155" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="845" y="145" font-family="Georgia, serif" font-size="11" fill="#666" font-style="italic">3D</text>
  <text x="845" y="161" font-family="Georgia, serif" font-size="11" fill="#666" font-style="italic">SGs</text>
</svg>