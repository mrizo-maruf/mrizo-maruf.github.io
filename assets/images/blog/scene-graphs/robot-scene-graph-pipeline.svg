<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280">
  <defs>
    <marker id="parrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <filter id="bshadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#333" font-weight="bold">Scene-Graph-Based Robotic Perception Pipeline</text>

  <!-- Step 1: Sensor Input -->
  <rect x="20" y="55" width="130" height="170" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#bshadow)"/>
  <text x="85" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1565c0" font-weight="bold">Sensor Input</text>
  <line x1="35" y1="88" x2="135" y2="88" stroke="#90caf9" stroke-width="1"/>
  <rect x="35" y="98" width="100" height="35" rx="4" fill="#bbdefb" stroke="#64b5f6" stroke-width="1"/>
  <text x="85" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#1565c0">RGB-D Camera</text>
  <rect x="35" y="142" width="100" height="35" rx="4" fill="#bbdefb" stroke="#64b5f6" stroke-width="1"/>
  <text x="85" y="164" text-anchor="middle" font-family="monospace" font-size="9" fill="#1565c0">LiDAR</text>
  <rect x="35" y="186" width="100" height="28" rx="4" fill="#bbdefb" stroke="#64b5f6" stroke-width="1"/>
  <text x="85" y="205" text-anchor="middle" font-family="monospace" font-size="9" fill="#1565c0">Odometry</text>

  <!-- Arrow -->
  <line x1="155" y1="140" x2="185" y2="140" stroke="#666" stroke-width="2" marker-end="url(#parrow)"/>

  <!-- Step 2: Perception -->
  <rect x="190" y="55" width="150" height="170" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#bshadow)"/>
  <text x="265" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2e7d32" font-weight="bold">Perception</text>
  <line x1="205" y1="88" x2="325" y2="88" stroke="#a5d6a7" stroke-width="1"/>
  <rect x="205" y="98" width="120" height="28" rx="4" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1"/>
  <text x="265" y="116" text-anchor="middle" font-family="monospace" font-size="9" fill="#2e7d32">Object Detection</text>
  <rect x="205" y="132" width="120" height="28" rx="4" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1"/>
  <text x="265" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#2e7d32">3D Reconstruction</text>
  <rect x="205" y="166" width="120" height="28" rx="4" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1"/>
  <text x="265" y="184" text-anchor="middle" font-family="monospace" font-size="9" fill="#2e7d32">Segmentation</text>
  <rect x="205" y="198" width="120" height="20" rx="4" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1"/>
  <text x="265" y="212" text-anchor="middle" font-family="monospace" font-size="8" fill="#2e7d32">SLAM / Pose Est.</text>

  <!-- Arrow -->
  <line x1="345" y1="140" x2="375" y2="140" stroke="#666" stroke-width="2" marker-end="url(#parrow)"/>

  <!-- Step 3: Scene Graph -->
  <rect x="380" y="50" width="155" height="180" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#bshadow)"/>
  <text x="457" y="73" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e65100" font-weight="bold">3D Scene Graph</text>
  <line x1="395" y1="83" x2="520" y2="83" stroke="#ffb74d" stroke-width="1"/>
  <!-- Mini graph -->
  <circle cx="420" cy="110" r="14" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
  <text x="420" y="114" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">room</text>
  <circle cx="490" cy="105" r="12" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
  <text x="490" y="109" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">table</text>
  <circle cx="430" cy="158" r="12" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
  <text x="430" y="162" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">cup</text>
  <circle cx="495" cy="155" r="12" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
  <text x="495" y="159" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">chair</text>
  <circle cx="460" cy="200" r="12" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
  <text x="460" y="204" text-anchor="middle" font-family="monospace" font-size="7" fill="#e65100">robot</text>
  <line x1="432" y1="120" x2="480" y2="108" stroke="#ff9800" stroke-width="1"/>
  <line x1="425" y1="124" x2="428" y2="146" stroke="#ff9800" stroke-width="1"/>
  <line x1="488" y1="117" x2="492" y2="143" stroke="#ff9800" stroke-width="1"/>
  <line x1="442" y1="165" x2="458" y2="188" stroke="#ff9800" stroke-width="1"/>
  <line x1="490" y1="167" x2="468" y2="192" stroke="#ff9800" stroke-width="1"/>

  <!-- Arrow -->
  <line x1="540" y1="140" x2="570" y2="140" stroke="#666" stroke-width="2" marker-end="url(#parrow)"/>

  <!-- Step 4: Reasoning -->
  <rect x="575" y="55" width="130" height="170" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5" filter="url(#bshadow)"/>
  <text x="640" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7b1fa2" font-weight="bold">Reasoning</text>
  <line x1="590" y1="88" x2="690" y2="88" stroke="#ce93d8" stroke-width="1"/>
  <rect x="590" y="98" width="100" height="28" rx="4" fill="#e1bee7" stroke="#ab47bc" stroke-width="1"/>
  <text x="640" y="116" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a1b9a">Task Planning</text>
  <rect x="590" y="132" width="100" height="28" rx="4" fill="#e1bee7" stroke="#ab47bc" stroke-width="1"/>
  <text x="640" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a1b9a">LLM Queries</text>
  <rect x="590" y="166" width="100" height="28" rx="4" fill="#e1bee7" stroke="#ab47bc" stroke-width="1"/>
  <text x="640" y="184" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a1b9a">Graph Search</text>
  <rect x="590" y="200" width="100" height="20" rx="4" fill="#e1bee7" stroke="#ab47bc" stroke-width="1"/>
  <text x="640" y="214" text-anchor="middle" font-family="monospace" font-size="8" fill="#6a1b9a">Spatial Queries</text>

  <!-- Arrow -->
  <line x1="710" y1="140" x2="740" y2="140" stroke="#666" stroke-width="2" marker-end="url(#parrow)"/>

  <!-- Step 5: Action -->
  <rect x="745" y="75" width="100" height="130" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#bshadow)"/>
  <text x="795" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c62828" font-weight="bold">Action</text>
  <line x1="760" y1="108" x2="830" y2="108" stroke="#ef9a9a" stroke-width="1"/>
  <rect x="758" y="118" width="74" height="25" rx="4" fill="#ffcdd2" stroke="#e57373" stroke-width="1"/>
  <text x="795" y="134" text-anchor="middle" font-family="monospace" font-size="8" fill="#c62828">Navigate</text>
  <rect x="758" y="149" width="74" height="25" rx="4" fill="#ffcdd2" stroke="#e57373" stroke-width="1"/>
  <text x="795" y="165" text-anchor="middle" font-family="monospace" font-size="8" fill="#c62828">Manipulate</text>
  <rect x="758" y="179" width="74" height="20" rx="4" fill="#ffcdd2" stroke="#e57373" stroke-width="1"/>
  <text x="795" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="#c62828">Interact</text>

  <!-- Bottom labels -->
  <text x="430" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#888">Sensors produce raw data &rarr; perception extracts entities &rarr; scene graph structures knowledge &rarr; reasoning plans &rarr; robot acts</text>
</svg>