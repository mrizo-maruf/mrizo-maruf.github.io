<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Mukhammadrizo Maribjonov</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 16px;
            line-height: 1.7;
            color: #333;
            background: #fff;
            margin: 0;
            padding: 0;
        }

        a {
            color: #1772d0;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 30px;
        }

        .site-header {
            text-align: center;
            padding: 30px 0 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }

        .site-header h1 {
            font-size: 28px;
            font-weight: normal;
            margin: 0;
            color: #333;
        }

        .nav {
            text-align: center;
            padding: 10px 0 20px;
        }

        .nav a {
            margin: 0 12px;
            font-size: 15px;
        }

        h2 {
            font-size: 22px;
            font-weight: normal;
            border-bottom: 1px solid #ddd;
            padding-bottom: 6px;
            margin: 40px 0 20px;
            color: #333;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #999;
            font-size: 13px;
            border-top: 1px solid #eee;
            margin-top: 40px;
        }

        /* Blog styles */
        .post-title {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0 4px;
            color: #333;
        }

        .post-meta {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .post-content h1, .post-content h2, .post-content h3 {
            margin-top: 30px;
        }

        .post-content img {
            max-width: 100%;
        }

        .post-content pre {
            background: #f6f6f6;
            padding: 14px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
        }

        .post-content code {
            background: #f6f6f6;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 14px;
        }

        .post-content pre code {
            background: none;
            padding: 0;
        }

        .post-content blockquote {
            border-left: 3px solid #ddd;
            margin: 20px 0;
            padding: 4px 16px;
            color: #666;
        }

        .post-content figure {
            margin: 30px 0;
            text-align: center;
        }

        .post-content figure img {
            max-width: 100%;
            border-radius: 4px;
        }

        .post-content figcaption {
            margin-top: 8px;
            font-size: 13px;
            color: #888;
            font-style: italic;
            line-height: 1.5;
        }

        .post-content .paper-ref {
            background: #f8f9fa;
            border-left: 3px solid #1772d0;
            padding: 12px 16px;
            margin: 20px 0;
            font-size: 14px;
        }

        .post-content .paper-ref strong {
            color: #333;
        }

        .post-content .paper-ref em {
            color: #666;
        }

        .post-content .timeline-item {
            border-left: 3px solid #1772d0;
            padding: 8px 0 8px 20px;
            margin: 0;
            position: relative;
        }

        .post-content .timeline-item::before {
            content: '';
            width: 11px;
            height: 11px;
            background: #1772d0;
            border-radius: 50%;
            position: absolute;
            left: -7px;
            top: 14px;
        }

        .post-content .timeline-year {
            font-weight: bold;
            color: #1772d0;
            font-size: 15px;
        }

        .blog-list {
            list-style: none;
            padding: 0;
        }

        .blog-list li {
            margin-bottom: 20px;
        }

        .blog-list .post-date {
            color: #888;
            font-size: 14px;
        }

        .blog-list .post-link {
            font-size: 17px;
            font-weight: bold;
        }

        .blog-list .post-excerpt {
            color: #555;
            font-size: 15px;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .container { padding: 15px 20px; }
            .nav a { margin: 0 8px; font-size: 14px; }
            .site-header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="site-header">
            <h1><a href="/" style="color: #333;">Mukhammadrizo Maribjonov</a></h1>
        </div>

        <div class="nav">
            <a href="/">Home</a>
            <a href="/blog">Blog</a>
        </div>

        {{ content }}

        <div class="footer">
            Copyright 2026 Mukhammadrizo Maribjonov
        </div>

    </div>
</body>
</html>
